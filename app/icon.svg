<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" fill="none">
  <defs>
    <linearGradient id="rGrad" x1="160" y1="60" x2="320" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5ee87a"/>
      <stop offset="100%" stop-color="#1a9e50"/>
    </linearGradient>
    <linearGradient id="handGrad" x1="60" y1="320" x2="340" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8f5dc" stop-opacity="0"/>
      <stop offset="35%" stop-color="#d4fae4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e0fded" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- R letterform (bold, rounded) -->
  <path
    d="
      M 120 80
      L 120 440
      L 178 440
      L 178 300
      L 225 300
      L 330 440
      L 400 440
      L 290 293
      C 345 273 378 233 378 178
      C 378 118 333 80 262 80
      Z
      M 178 130
      L 256 130
      C 295 130 320 150 320 178
      C 320 208 295 250 256 250
      L 178 250
      Z
    "
    fill="url(#rGrad)"
  />

  <!-- Arm sweeping through R -->
  <path
    d="
      M 55 370
      C 90 355 140 330 200 305
      C 240 288 275 272 305 262
      C 325 255 342 252 352 256
      C 360 259 360 266 350 272
      C 342 277 330 280 318 280
      C 330 276 342 272 340 265
      C 338 259 326 257 310 263
      C 278 274 238 292 195 312
      C 138 339 85 365 55 382
      Z
    "
    fill="url(#handGrad)"
  />

  <!-- Fingers (3 spread fingers at right end of hand) -->
  <!-- Finger 1 - top -->
  <path
    d="M 310 262 Q 340 240 368 238 Q 378 240 375 250 Q 372 258 355 262"
    fill="none" stroke="#d8fce8" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"
  />
  <!-- Finger 2 - middle -->
  <path
    d="M 316 268 Q 348 252 372 255 Q 380 260 376 270 Q 370 278 354 278"
    fill="none" stroke="#d0f9e0" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"
  />
  <!-- Finger 3 - lower -->
  <path
    d="M 320 276 Q 350 266 368 272 Q 375 278 370 287 Q 362 294 348 291"
    fill="none" stroke="#c8f5dc" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Circle / target element top right -->
  <circle cx="420" cy="110" r="40" stroke="#4ade80" stroke-width="14" fill="none"/>
  <circle cx="420" cy="110" r="10" fill="#4ade80"/>
  <!-- Stick connecting circle to R bump -->
  <line x1="388" y1="138" x2="358" y2="175" stroke="#4ade80" stroke-width="10" stroke-linecap="round"/>
</svg>
